baseURL: "https://turbokernel-th.github.io/"
title: "Metee Y \\ Turbo 🚀"
defaultContentLanguage: en
publishDir: "dist"

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

enableInlineShortcodes: true
params:
  author: "Metee Yingyongwatthanakit"
  math: true
  defaultTheme: light

  profileMode:
    enabled: true
    title: "Metee Y \\ Turbo 🚀"
    subtitle: "Mathematics enthusiast | Programmer | Data Practitioner | Business Solution"
    imageUrl: "/images/profile.jpg"
    imageTitle: "Metee Yingyongwatthanakit"
    buttons:
      - name: Projects
        url: "/projects"
      - name: About
        url: "/about"
      - name: Email
        url: "mailto:metee.ying@gmail.com"

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/meteeyingyong/"
    - name: email
      url: "mailto:metee.ying@gmail.com"

  ShowShareButtons: true
  ShowToc: true

  ShowSearch: true

  assets:
    disableHLJS: false

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: archives
      name: Archive
      url: /archives/
      weight: 30
    - identifier: search
      name: Search
      url: "#search"
      weight: 40

